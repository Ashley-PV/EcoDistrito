<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoDistrito - Administración</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
</head>
<body class="dashboard">
  <div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar" aria-label="Barra lateral de navegación">
      <div class="logoBox">
        <img src="Imagenes/Logo sin fondo.png" alt="Logo EcoDistrito">
      </div>

      <!-- SIDEBAR -->
    <aside class="sidebar" aria-label="Barra lateral de navegación">
      <div class="logoBox">
        <img src="Imagenes/Logo sin fondo.png" alt="Logo EcoDistrito">
      </div>

      <nav aria-label="Menú principal">
        <ul>
          <li class="active" role="menuitem"><a href="dashboard.html" class="nav-link"><i class="fa fa-home"></i> Inicio</a></li>
          <li class="active" role="menuitem"><a href="rutas.html" class="nav-link"><i class="fa fa-route"></i> Rutas</a></li>
          <li class="active" role="menuitem"><a href="recoleccion.html" class="nav-link"><i class="fa fa-recycle"></i> Recolección</a></li>
          <li class="active" role="menuitem"><a href="mapas.html" class="nav-link"><i class="fa fa-map"></i> Mapas</a></li>
          <li class="active" role="menuitem"><a href="reportes.html" class="nav-link"><i class="fa fa-file"></i> Reportes</a></li>
          <li class="active" role="menuitem"><a href="administracion.html" class="nav-link"><i class="fa fa-cog"></i> Administración</a></li>
        </ul>
      </nav>

      <button onclick="logout()" class="btn" aria-label="Cerrar sesión">Salir</button>

    <script>
        function logout() {
            try {
    // Limpia almacenamiento local/session si corresponde
            localStorage.removeItem('token');
             sessionStorage.clear();
                } catch (e) {
            console.warn('No se pudo limpiar almacenamiento local', e);
             }

  // Redirigir al login
  window.location.href = 'login.html';
        }
    </script>

    </aside>

      
    <main class="main">
      <div class="top"><div><h2>Administración</h2><p>Gestión de usuarios y configuración</p></div></div>

      <div class="controls" style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
        <form id="addUserForm" style="display:flex;gap:8px;align-items:center;">
          <input name="name" placeholder="Nombre" required />
          <input name="email" placeholder="Email" required />
          <select name="role" required><option>Administrador</option><option>Operador</option></select>
          <button class="btn small" type="submit">Crear usuario</button>
        </form>
      </div>

      <div class="grid">
        <section class="box">
          <h3>Usuarios</h3>
          <div class="table-wrap">
            <table id="usersTable" class="routes-table">
              <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Creado</th><th>Acciones</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <aside class="box">
          <h3>Configuración del sistema</h3>
          <p>Horarios, zonas y seguridad</p>
          <!-- controles de ejemplo -->
          <button id="btnSaveConfig" class="btn small">Guardar configuración</button>
        </aside>
      </div>
    </main>
  </div>

  <script src="administracion.js"></script>
</body>
</html>
